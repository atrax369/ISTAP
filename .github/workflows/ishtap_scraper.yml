# .github/workflows/ishtap_scraper.yml
name: İşTap Scraper

on:
  schedule:
    - cron: "0 4 * * *"   # Hər gün saat 08:00 Bakı vaxtı (UTC+4)
  workflow_dispatch:        # Manual işə salma

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asılılıqları yüklə
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Scraper-i işə sal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ishtap_scraper.py

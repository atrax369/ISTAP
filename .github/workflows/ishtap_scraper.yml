# .github/workflows/ishtap_scraper.yml
name: İşTap Robust Scraper

on:
  schedule:
    - cron: "0 4 * * *"   # UTC 04:00 = Bakı 08:00 (UTC+4)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asılılıqları yüklə
        run: |
          pip install requests beautifulsoup4 supabase google-generativeai

      - name: Scraper-i işə sal
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
        run: python ishtap_scraper.py
